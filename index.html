<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KURSOR — Просмотр видео</title>

  <!-- Подключаем округлый геометрический шрифт Onest через Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ШАПКА: текстовый логотип KURSOR с подписью -->
  <header class="site-header">
    <div class="logo-block">
      <div class="logo-icon" aria-hidden="true"></div>
      <div class="logo-text">
        <span class="logo-name">KURSOR</span>
        <span class="logo-caption">школа программирования</span>
      </div>
    </div>
  </header>

  <main class="page">
    <!-- ================= ЭКРАН ВВОДА ПАРОЛЯ ================= -->
    <!-- Показывается по умолчанию. Видео скрыто и недоступно. -->
    <section id="lockScreen" class="screen card lock-card">
      <h1 class="title">Доступ к видео</h1>
      <p class="subtitle">
        Введите пароль, чтобы открыть просмотр урока.
      </p>

      <!-- Форма ввода пароля -->
      <form id="passwordForm" class="password-form" autocomplete="off">
        <div class="input-wrap">
          <!-- Иконка замка слева -->
          <span class="lock-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="10" width="16" height="11" rx="2.5" />
              <path d="M8 10V7a4 4 0 0 1 8 0v3" />
            </svg>
          </span>

          <input
            id="passwordInput"
            class="password-input"
            type="password"
            placeholder="Введите пароль"
            aria-label="Пароль"
          />
        </div>

        <!-- Сообщение об ошибке (скрыто по умолчанию) -->
        <p id="errorMsg" class="error-msg" hidden>
          Неверный пароль, попробуйте ещё раз
        </p>

        <button type="submit" class="btn-primary">Смотреть</button>
      </form>
    </section>

    <!-- ================= ЭКРАН ВИДЕО ================= -->
    <!-- Показывается только после успешного ввода пароля. -->
    <section id="videoScreen" class="screen video-screen" hidden>
      <div class="video-head">
        <h1 class="title">Ваш урок</h1>
        <!-- Кнопка выхода: сбрасывает доступ -->
        <button id="logoutBtn" class="btn-logout" type="button">Выйти</button>
      </div>

      <!-- Скруглённая рамка с тенью вокруг адаптивного плеера 16:9 -->
      <div class="video-frame">
        <!--
          controlsList="nodownload" убирает кнопку скачивания,
          oncontextmenu="return false" отключает меню по правому клику.
          Это МЯГКАЯ защита (см. комментарий в script.js).
        -->
        <video
          id="videoPlayer"
          class="video-player"
          controls
          controlsList="nodownload"
          oncontextmenu="return false"
          playsinline
          preload="metadata"
        >
          <!-- Путь к файлу подставляется из config в script.js -->
          Ваш браузер не поддерживает встроенное видео.
        </video>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
